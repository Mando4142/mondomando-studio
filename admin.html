<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Admin</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --form-bg: rgba(19, 19, 26, 0.9); }
        body, html { margin: 0; padding: 20px; font-family: 'Impact', sans-serif; color: white; background:#0b0b12; }
        .card { background: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(5,5,7,0.8); border: 1px solid #333; margin-bottom: 10px; border-radius: 6px; font-family:sans-serif;}
        .btn { padding: 10px 15px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; color:white; font-family: 'Impact', sans-serif; text-transform: uppercase; letter-spacing: 1px;}
        .btn-green { background: #22c55e; } .btn-red { background: #ef4444; } .btn-gold { background: var(--neon-gold); color:black; } .btn-blue { background: #3b82f6; }
        #login { position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0b12; z-index:999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="login">
        <div class="card" style="text-align:center;">
            <h2 style="color:var(--neon-pink);">PASSWORT</h2>
            <input type="password" id="pw" style="padding:10px; margin-bottom:15px; width:100%;"><br>
            <button class="btn btn-green" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="color:var(--neon-cyan); margin:0;">DASHBOARD SCHALTZENTRALE</h1>
        <div style="display: flex; gap: 10px;">
            <button id="btn-system-online" class="btn btn-green" onclick="setSystemStatus(true)">🟢 ONLINE</button>
            <button id="btn-system-offline" class="btn" style="background:#374151;" onclick="setSystemStatus(false)">🔴 OFFLINE</button>
            <button class="btn btn-red" onclick="resetAll()">⚠️ ALLES RESETTEN</button>
        </div>
    </div>

    <div class="card" style="border-color:var(--neon-gold);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--neon-gold); margin:0;">🗳️ VOTING STEUERUNG</h2>
            <div id="admin-voting-controls"></div>
        </div>
    </div>

    <div class="card" style="border-color:var(--neon-gold);">
        <h2 style="color:var(--neon-gold); margin-top:0;">👑 STRIPE KÄUFE (STREAM HISTORIE)</h2>
        <div id="gold-pass-list" style="max-height:250px; overflow-y:auto;"></div>
    </div>

    <div class="card" style="border-color:#c084fc;">
        <h2 style="color:#c084fc; margin-top:0;">🌙 AFTER HOURS QUEUE</h2>
        <div id="ah-queue"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0;">🔥 NORMALE QUEUE</h2>
            <button class="btn btn-blue" onclick="action('/api/admin/toggle-extension')">⏳ VERLÄNGERUNG UMSCHALTEN</button>
        </div>
        <div id="normal-queue"></div>
    </div>

<script>
    let token = "";
    let adminTimerInterval = null;
    let adminRemainingSeconds = 0;

    function login() { token = document.getElementById('pw').value; document.getElementById('login').style.display = 'none'; loadData(); setInterval(loadData, 4000); }

    async function action(url, method="POST", body=null) { 
        const options = { method, headers:{'Authorization': token, 'Content-Type': 'application/json'} };
        if(body) options.body = JSON.stringify(body);
        await fetch(url, options); 
        loadData(); 
    }
    
    function resetAll() { if(confirm("Macht alle Listen & Käufe leer! Sicher?")) action('/api/queue/reset'); }
    function setSystemStatus(isOnline) { action('/api/admin/set-system-status', 'POST', { online: isOnline }); }

    function startAdminTimer(seconds) {
        if (adminTimerInterval) clearInterval(adminTimerInterval);
        adminRemainingSeconds = seconds; updateAdminTimerVisuals();
        adminTimerInterval = setInterval(() => {
            adminRemainingSeconds--;
            if (adminRemainingSeconds <= 0) { adminRemainingSeconds = 0; clearInterval(adminTimerInterval); }
            updateAdminTimerVisuals();
        }, 1000);
    }

    function updateAdminTimerVisuals() {
        const textEl = document.getElementById('admin-timer-text');
        if (!textEl) return;
        const m = Math.floor(adminRemainingSeconds / 60); const s = adminRemainingSeconds % 60;
        textEl.innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
        textEl.style.color = adminRemainingSeconds > 120 ? '#22c55e' : (adminRemainingSeconds > 60 ? '#ffd700' : '#ef4444');
    }

    function buildItemHTML(item, index, listType) {
        if(item.isDone) return '';
        const diceBadge = item.songDiceWinner ? ` <span style="background:var(--neon-pink); padding:2px 6px; border-radius:4px; font-size:12px; font-weight:bold;">🎲 GEWÜRFELT</span>` : '';
        return `<div class="admin-item" style="${item.isHit ? 'border-color:var(--neon-gold); box-shadow: 0 0 10px rgba(255,215,0,0.3);' : ''}">
            <div><b>${item.artist}</b> - ${item.title} <a href="${item.songLink}" target="_blank" style="color:var(--neon-cyan); text-decoration:none; font-weight:bold;">[LINK]</a> ${diceBadge}</div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-gold" onclick="action('/api/queue/${listType}/${index}/hit')">⭐ HIT</button>
                <button class="btn btn-green" onclick="action('/api/queue/${listType}/${index}/done')">✓ DONE</button>
                <button class="btn btn-red" onclick="if(confirm('Löschen?')) action('/api/queue/${listType}/${index}', 'DELETE')">🗑</button>
            </div>
        </div>`;
    }

    async function loadData() {
        if(!token) return;
        const res = await fetch('/api/queue'); const data = await res.json();
        
        // System Status Buttons
        const btnOnline = document.getElementById('btn-system-online');
        const btnOffline = document.getElementById('btn-system-offline');
        if (data.systemOnline === false) {
            btnOnline.style.background = "#374151"; btnOffline.style.background = "#ef4444";
        } else {
            btnOnline.style.background = "#22c55e"; btnOffline.style.background = "#374151";
        }

        // Voting Controls
        const vBox = document.getElementById('admin-voting-controls');
        if (data.votingPhase === 'inactive') {
            vBox.innerHTML = `<button class="btn btn-gold" onclick="action('/api/admin/voting/start')">🔴 VOTING STARTEN (4 MIN)</button>`;
            if(adminTimerInterval) { clearInterval(adminTimerInterval); adminTimerInterval = null; }
        } else if (data.votingPhase === 'active') {
            vBox.innerHTML = `
                <div style="display:flex; align-items:center; gap:20px;">
                    <div id="admin-timer-text" style="font-size:32px; font-weight:bold;">04:00</div>
                    <button class="btn btn-blue" onclick="action('/api/admin/voting/reset-timer')">🔄 +4 MIN</button>
                    <button class="btn btn-green" onclick="action('/api/admin/voting/resolve')">✅ MANUELL BEENDEN</button>
                </div>
            `;
            if (!adminTimerInterval || Math.abs(adminRemainingSeconds - data.votingRemainingSeconds) > 2) {
                startAdminTimer(data.votingRemainingSeconds);
            }
        } else if (data.votingPhase === 'tiebreak') {
            let tbHtml = `<div style="display:flex; gap:10px; align-items:center;"><span style="color:#ef4444; font-weight:bold;">⚠️ GLEICHSTAND:</span>`;
            data.tiedSongs.forEach(s => {
                tbHtml += `<button class="btn btn-gold" onclick="action('/api/admin/voting/resolve', 'POST', { forceWinnerId: '${s.id}' })">👑 WÄHLE ${s.artist}</button>`;
            });
            tbHtml += `</div>`;
            vBox.innerHTML = tbHtml;
            if(adminTimerInterval) { clearInterval(adminTimerInterval); adminTimerInterval = null; }
        }

        // Gold Pass List
        const gList = document.getElementById('gold-pass-list'); gList.innerHTML = '';
        data.goldPassHistory.slice().reverse().forEach(p => {
            gList.innerHTML += `<div class="admin-item" style="border-left:4px solid var(--neon-gold);">
                <div><b>${p.artist}</b> kaufte <b>${p.product}</b></div>
                <div style="text-align:right;"><span style="color:var(--neon-green); font-weight:bold;">${p.price}</span><br><small style="color:#888;">${p.date}</small></div>
            </div>`;
        });

        // Queues
        const qList = document.getElementById('normal-queue'); qList.innerHTML = '';
        data.queue.forEach((item, i) => qList.innerHTML += buildItemHTML(item, i, 'normal'));

        const ahList = document.getElementById('ah-queue'); ahList.innerHTML = '';
        data.afterHoursQueue.forEach((item, i) => ahList.innerHTML += buildItemHTML(item, i, 'ah'));
    }
</script>
</body>
</html>
