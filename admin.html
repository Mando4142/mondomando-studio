<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Studio - Admin Schaltzentrale</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --text-main: #ffffff; --form-bg: rgba(19, 19, 26, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 850px; }
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-pink); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); backdrop-filter: blur(5px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 20px;}
        h1 { margin: 0; font-size: 32px; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-pink); }
        .btn-reset { background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-family: sans-serif; font-weight: bold; cursor: pointer; }
        
        /* COIN INTERFACES */
        .coin-box { display: flex; gap: 10px; background: rgba(5, 5, 7, 0.8); padding: 15px; border-radius: 8px; border: 1px solid var(--neon-gold); margin-bottom: 20px; font-family: sans-serif; align-items: center; }
        .coin-input { padding: 10px; background: #000; border: 1px solid var(--neon-cyan); color: #fff; border-radius: 4px; font-size: 16px; font-weight: bold; flex: 1; }
        .btn-coin-grant { background: var(--neon-gold); color: #000; border: none; padding: 10px 20px; font-family: 'Impact', sans-serif; font-size: 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-coin-grant:hover { filter: brightness(1.2); }

        .admin-time-box { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: rgba(5, 5, 7, 0.6); border: 1px dashed var(--neon-cyan); border-radius: 8px; font-family: sans-serif; font-size: 16px; font-weight: bold; }
        .time-value { color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0, 242, 254, 0.5); }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: rgba(5, 5, 7, 0.85); border: 2px solid #2a2a35; border-radius: 8px; margin-bottom: 15px; font-family: sans-serif; }
        .admin-item.is-active-first { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .admin-item.is-hit { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .admin-item.is-done-admin { border-color: #22c55e; opacity: 0.4; }

        .song-details h3 { margin: 0 0 5px 0; font-size: 20px; color: #fff; }
        .song-details p { margin: 0; color: #8e8e9f; font-size: 14px; }
        .actions-flex { display: flex; gap: 10px; align-items: center; }
        
        .btn-listen { color: black; border: none; padding: 14px 20px; font-size: 16px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; }
        .platform-spotify { background: linear-gradient(45deg, #1db954, #128c3b) !important; color: white !important; }
        .platform-youtube { background: linear-gradient(45deg, #ff0000, #b30000) !important; color: white !important; }
        .platform-default { background: linear-gradient(45deg, #8e8e9f, #575766) !important; color: white !important; }
        
        .btn-hit-toggle { background: linear-gradient(45deg, var(--neon-gold), #ccac00); color: black; border: none; padding: 14px 20px; font-size: 16px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
        .btn-done { background: linear-gradient(45deg, #22c55e, #15803d); color: white; border: none; padding: 14px 24px; font-size: 16px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
        .btn-trash { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 12px 15px; font-size: 16px; border-radius: 6px; cursor: pointer; }
        .btn-trash:hover { background: #ef4444; color: white; }
        .btn-undo { background: #374151; color: #d1d5db; border: none; padding: 14px 20px; font-size: 16px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; }

        .section-title { font-size: 22px; letter-spacing: 1px; color: #ffffff; margin: 25px 0 15px 0; text-transform: uppercase; border-bottom: 2px dashed #3a3a45; padding-bottom: 5px; }
        .no-songs { text-align: center; font-family: sans-serif; color: #8e8e9f; padding: 20px 0; font-size: 16px; }

        #admin-lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d11; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .login-card { background:var(--form-bg); border:2px solid var(--neon-pink); padding:40px; border-radius:16px; text-align:center; max-width:400px; width:100%; }
        .login-input { width:100%; padding:15px; background:rgba(0,0,0,0.5); border:2px solid #2a2a35; border-radius:8px; color:white; font-size:18px; box-sizing:border-box; margin-bottom:20px; text-align:center; }
    </style>
</head>
<body>
    <div id="admin-lock-screen">
        <div class="login-card">
            <h1 style="font-size:28px; margin-bottom:10px; color:white;">STUDIO ACCESS</h1>
            <input type="password" id="adminPassField" class="login-input" placeholder="Passwort eingeben...">
            <button onclick="checkAdminGate()" class="btn-done" style="width:100%; padding:15px; font-size:20px;">COCKPIT ENTSPERREN 🔑</button>
        </div>
    </div>

    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card">
                <div class="header-flex">
                    <h1>MONDO MANDO LIVE-BOARD</h1>
                    <button class="btn-reset" onclick="resetQueue()">LISTE RESETTEN</button>
                </div>

                <div class="admin-time-box">
                    <div>SHOW-ZEIT BELEGT: <span id="admin-total-time" class="time-value">0 Min. 00 Sek.</span></div>
                    <div id="admin-form-status" style="color:var(--neon-cyan)">🟢 MONITOR AKTIV</div>
                </div>

                <div class="section-title" style="color: var(--neon-gold); border-color: var(--neon-gold);">Coin-Zahler Freischalten 💎</div>
                
                <div class="coin-box">
                    <span>🐸 Frosch-Zahler (Platz 1):</span>
                    <input type="text" id="froschUser" class="coin-input" placeholder="Künstlername eintippen...">
                    <button class="btn-coin-grant" onclick="grantCoinPrivilege('frosch')">Freigeben</button>
                </div>

                <div class="coin-box" style="border-color: var(--neon-cyan)">
                    <span>🎧 DJ-Set Zahler (3. Song):</span>
                    <input type="text" id="djUser" class="coin-input" placeholder="Künstlername eintippen...">
                    <button class="btn-coin-grant" style="background:var(--neon-cyan)" onclick="grantCoinPrivilege('dj')">Freigeben</button>
                </div>

                <div style="text-align:center; margin-bottom:25px;">
                    <button class="btn-hit-toggle" style="width:100%; padding:15px;" id="vote-toggle-btn" onclick="toggleLiveVotingServer()">Anzeige am Ende: Live-Voting starten 🗳️</button>
                </div>

                <div class="section-title" style="color: var(--neon-cyan);">Offene Einsendungen 🔥</div>
                <div id="admin-active-list"></div>

                <div class="section-title" style="color: #22c55e;">Bereits bewertet (Historie) ✓</div>
                <div id="admin-done-list"></div>

                <div class="section-title" style="color: var(--neon-gold); border-color: var(--neon-gold); margin-top:40px;">🏆 Playlist-Helfer (Hit-History)</div>
                <div id="admin-playlist-helper-list"></div>
            </div>
        </div>
    </div>

<script>
    const token = "MONDO_STUDIO_CHEF_2026";

    function checkAdminGate() {
        const pw = document.getElementById('adminPassField').value;
        if(pw === token) {
            document.getElementById('admin-lock-screen').style.display = 'none';
            localStorage.setItem('studio_logged', 'true');
            loadAdminQueue();
            setInterval(loadAdminQueue, 4000);
        } else { alert("Falsches Passwort!"); }
    }

    if(localStorage.getItem('studio_logged') === 'true') {
        document.getElementById('admin-lock-screen').style.display = 'none';
        loadAdminQueue();
        setInterval(loadAdminQueue, 4000);
    }

    // Funktion um den Spender namentlich freizuschalten
    async function grantCoinPrivilege(type) {
        const username = document.getElementById(type === 'frosch' ? 'froschUser' : 'djUser').value;
        if(!username) return alert("Bitte Namen eingeben!");
        
        const res = await fetch('/api/admin/set-coin-user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': token},
            body: JSON.stringify({ type, username })
        });
        if(res.ok) {
            alert(`Erfolgreich! ${username} ist für das ${type.toUpperCase()}-Feature freigeschaltet!`);
            document.getElementById(type === 'frosch' ? 'froschUser' : 'djUser').value = "";
        }
    }

    async function loadAdminQueue() {
        if(localStorage.getItem('studio_logged') !== 'true') return;
        try {
            const res = await fetch('/api/queue'); 
            const data = await res.json();
            const queue = data.queue || [];
            
            const activeList = document.getElementById('admin-active-list');
            const doneList = document.getElementById('admin-done-list');
            const helperList = document.getElementById('admin-playlist-helper-list');
            
            document.getElementById('admin-total-time').innerText = data.spentFormatted;
            
            const voteBtn = document.getElementById('vote-toggle-btn');
            if(data.votingActive) {
                voteBtn.innerText = "🛑 Voting Beenden & Sichern";
                voteBtn.style.background = "var(--neon-pink)";
            } else {
                voteBtn.innerText = "🗳️ Live-Voting Starten";
                voteBtn.style.background = "";
            }

            const activeSongs = queue.filter(item => !item.isDone);
            const hitHistorySongs = queue.filter(item => item.status === 'hit');
            
            activeList.innerHTML = ''; doneList.innerHTML = ''; helperList.innerHTML = '';
            
            if(activeSongs.length === 0) activeList.innerHTML = '<div class="no-songs">Keine offenen Songs.</div>';
            if(hitHistorySongs.length === 0) helperList.innerHTML = '<div class="no-songs">Keine Hits vergeben.</div>';

            hitHistorySongs.forEach(item => {
                helperList.innerHTML += `
                    <div class="admin-item" style="border-color: var(--neon-gold); padding: 12px 20px; margin-bottom: 8px;">
                        <h3 style="color: var(--neon-gold); font-size:16px; margin:0;">🎵 ${item.artist} - ${item.title}</h3>
                        <a href="${item.songLink}" target="_blank" class="btn-listen platform-default" style="padding: 8px 15px; font-size:12px;">LINK 🔗</a>
                    </div>`;
            });

            queue.forEach((item) => {
                const min = Math.floor(item.duration / 60); const sec = item.duration % 60;
                let platformClass = 'platform-default';
                if(item.songLink && item.songLink.includes('spotify.com')) platformClass = 'platform-spotify';
                if(item.songLink && (item.songLink.includes('youtube.com') || item.songLink.includes('youtu.be'))) platformClass = 'platform-youtube';

                if(!item.isDone) {
                    let activeIndex = activeSongs.indexOf(item);
                    let titlePrefix = activeIndex === 0 ? '[DRAN] ' : '';
                    if (item.status === 'hit') titlePrefix = '[⭐ HIT] ' + titlePrefix;
                    
                    activeList.innerHTML += `
                        <div class="admin-item ${item.status === 'hit' ? 'is-hit' : (activeIndex === 0 ? 'is-active-first' : '')}">
                            <div class="song-details">
                                <h3>${titlePrefix}${item.artist} - ${item.title}</h3>
                                <p>Genre: ${item.genre} | Dauer: ${min}:${sec < 10 ? '0' : ''}${sec}</p>
                            </div>
                            <div class="actions-flex">
                                <a href="${item.songLink}" target="_blank" class="btn-listen ${platformClass}">ANHÖREN</a>
                                <button class="btn-hit-toggle" onclick="judgeSong(${item.id}, 'hit')">HIT ⭐</button>
                                <button class="btn-done" onclick="markAsDone(${item.id})">ERLEDIGT ✓</button>
                                <button class="btn-trash" onclick="killTrackFromDb(${item.id})">🗑️</button>
                            </div>
                        </div>`;
                } else {
                    doneList.innerHTML += `
                        <div class="admin-item is-done-admin">
                            <h3>${item.artist} - ${item.title}</h3>
                            <button class="btn-undo" onclick="markAsDone(${item.id})">↩</button>
                        </div>`;
                }
            });
        } catch(e) { console.log(e); }
    }

    async function judgeSong(id, status) { await fetch(`/api/queue/${id}/status`, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': token}, body: JSON.stringify({ status }) }); loadAdminQueue(); }
    async function markAsDone(id) { await fetch(`/api/queue/${id}/done`, { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function killTrackFromDb(id) { if(confirm("Song permanent löschen?")) { await fetch(`/api/queue/${id}`, { method: 'DELETE', headers: {'Authorization': token} }); loadAdminQueue(); } }
    async function toggleLiveVotingServer() { await fetch('/api/admin/voting', { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function resetQueue() { if(confirm("Ganze Liste resetten?")) { await fetch('/api/queue/reset', { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); } }
</script>
</body>
</html>
