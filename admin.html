<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando - Admin Schaltzentrale (Records)</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --text-main: #ffffff; --form-bg: rgba(19, 19, 26, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 800px; }
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-pink); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); backdrop-filter: blur(5px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 20px;}
        h1 { margin: 0; font-size: 32px; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-pink); }
        
        .admin-time-box { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: rgba(5, 5, 7, 0.6); border: 1px dashed var(--neon-cyan); border-radius: 8px; font-family: sans-serif; font-size: 16px; font-weight: bold; }
        .time-value { color: var(--neon-cyan); }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: rgba(5, 5, 7, 0.85); border: 2px solid #2a2a35; border-radius: 8px; margin-bottom: 15px; font-family: sans-serif; }
        .admin-item.is-active-first { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .admin-item.is-hit { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .admin-item.is-done-admin { border-color: #22c55e; opacity: 0.4; }

        .actions-flex { display: flex; gap: 10px; align-items: center; }
        .btn-control { background: #374151; color: white; border: none; padding: 10px 15px; font-family: sans-serif; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .btn-control:hover { background: #4b5563; transform: scale(1.02); }
        
        .link-icon { font-size: 20px; text-decoration: none; margin-right: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .icon-spotify { background: #1DB954; color: black; }
        .icon-youtube { background: #FF0000; color: white; }
        .icon-text { background: #444; color: white; font-size: 12px; }

        .btn-trash { background: #ef4444; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-listen { background: linear-gradient(45deg, var(--neon-cyan), #008fa3); color: black; border: none; padding: 14px 20px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .btn-hit-toggle { background: linear-gradient(45deg, var(--neon-gold), #ccac00); color: black; border: none; padding: 14px 20px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
        .btn-delete { background: linear-gradient(45deg, #22c55e, #15803d); color: white; border: none; padding: 14px 24px; font-family: 'Impact', sans-serif; text-transform: uppercase; border-radius: 6px; cursor: pointer; }
        
        .section-title { font-size: 22px; color: #ffffff; margin: 25px 0 15px 0; text-transform: uppercase; }
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0b12; z-index:9999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:#14141f; padding:40px; border-radius:12px; border:2px solid var(--neon-pink); text-align:center;">
            <h2 style="color:var(--neon-pink);">🔒 MONDO RECORDS SCHALTZENTRALE LOCK</h2>
            <input type="password" id="adminPassInput" placeholder="STUDIO PASSWORT" style="padding:14px; width:250px; text-align:center; font-size:16px;"><br><br>
            <button class="btn-control" style="background:var(--neon-cyan); color:black;" onclick="tryLogin()">PROCEED</button>
        </div>
    </div>

    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card">
                <div class="header-flex">
                    <h1>MONDO MANDO RECORDS LIVE-BOARD</h1>
                    <button class="btn-control" style="background:#ef4444;" onclick="resetQueue()">LISTE RESETTEN</button>
                </div>

                <div class="admin-time-box" style="flex-direction:column; gap:10px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>SHOW-ZEIT BELEBT: <span id="admin-total-time" class="time-value">0 Min. 00 Sek.</span></span>
                        <span id="admin-form-status">🟢 FORMULAR GEÖFFNET</span>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:5px; flex-wrap: wrap;">
                        <button class="btn-control" style="background: var(--neon-cyan); color: black;" onclick="addExactSlots(2)">⚡ 50K LIKES: +2 PLÄTZE</button>
                        <button class="btn-control" onclick="setOvertime(15)">🐸 FROSCH OVERTIME (+15 MIN)</button>
                        <button class="btn-control" onclick="setOvertime(30)">🐸 MAX OVERTIME (+30 MIN)</button>
                        <button class="btn-control" style="background:var(--neon-gold); color:black;" onclick="toggleVoting()">🏆 LIVE-VOTING START/STOP</button>
                        <button class="btn-control" style="background:#22c55e;" onclick="closeVotingAndSelectChamp()">👑 CHAMP KREIEREN</button>
                    </div>
                </div>

                <div class="section-title" style="color: var(--neon-gold);">🏆 Live-Voting Champions (Hall of Fame)</div>
                <div id="admin-hof-list" style="margin-bottom: 20px;"></div>

                <div class="section-title" style="color: var(--neon-cyan);">Offene Einsendungen 🔥</div>
                <div id="admin-active-list"></div>

                <div class="section-title" style="color: #22c55e;">Bereits bewertet (Historie) ✓</div>
                <div id="admin-done-list"></div>
            </div>
        </div>
    </div>
<script>
    let token = "";

    function tryLogin() {
        const pass = document.getElementById('adminPassInput').value;
        fetch('/api/admin/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password: pass })
        }).then(res => {
            if (res.ok) {
                token = pass;
                document.getElementById('login-overlay').style.display = 'none';
                loadAdminQueue();
                setInterval(loadAdminQueue, 4000);
            } else { alert("Falsches Passwort!"); }
        });
    }

    async function loadAdminQueue() {
        if(!token) return;
        try {
            const res = await fetch('/api/queue'); const data = await res.json();
            const queue = data.queue || [];
            const hof = data.hallOfFame || [];
            
            document.getElementById('admin-total-time').innerText = data.spentFormatted;
            const statusText = document.getElementById('admin-form-status');
            statusText.innerText = data.submissionsOpen ? "🟢 FORMULAR GEÖFFNET" : "🔴 LIMIT ERREICHT (GESPERRT)";
            
            const activeList = document.getElementById('admin-active-list');
            const doneList = document.getElementById('admin-done-list');
            const hofList = document.getElementById('admin-hof-list');
            const activeSongs = queue.filter(item => !item.isDone);
            
            activeList.innerHTML = ''; doneList.innerHTML = ''; hofList.innerHTML = '';

            // Render Hall of Fame
            if(hof.length === 0) { hofList.innerHTML = '<div class="no-songs">Noch keine Champions in der Liste.</div>'; }
            hof.forEach((c, hIndex) => {
                hofList.innerHTML += `
                    <div class="admin-item" style="border-color: var(--neon-gold); padding: 12px 20px;">
                        <div class="song-details">
                            <h3 style="color: var(--neon-gold);">⭐ ${c.artist} - ${c.title}</h3>
                            <p style="color: #bbb;">${c.votes} Votes | Show vom ${c.date}</p>
                        </div>
                        <div class="actions-flex">
                            <button class="btn-trash" onclick="deleteChampion(${hIndex})">🗑️</button>
                        </div>
                    </div>`;
            });

            queue.forEach((item, index) => {
                const min = Math.floor(item.duration / 60); const sec = item.duration % 60;
                
                let iconHtml = `<span class="link-icon icon-text">LINK</span>`;
                if(item.platform === 'spotify') iconHtml = `<span class="link-icon icon-spotify">🟢 SPOTIFY</span>`;
                if(item.platform === 'youtube') iconHtml = `<span class="link-icon icon-youtube">🔴 YOUTUBE</span>`;

                if(!item.isDone) {
                    let activeIndex = activeSongs.indexOf(item);
                    let titlePrefix = activeIndex === 0 ? '[DRAN] ' : '';
                    let itemStyleClass = item.isHit ? 'is-hit' : (activeIndex === 0 ? 'is-active-first' : '');

                    activeList.innerHTML += `
                        <div class="admin-item ${itemStyleClass}">
                            <div class="song-details">
                                <h3>${titlePrefix}${item.artist} - ${item.title}</h3>
                                <p>Genre: ${item.genre} | ⏱️ ${min+2}:${sec < 10 ? '0':''}${sec} Min</p>
                            </div>
                            <div class="actions-flex">
                                <a href="${item.songLink}" target="_blank">${iconHtml}</a>
                                <button class="btn-hit-toggle" onclick="toggleHit(${index})">HIT ⭐</button>
                                <button class="btn-delete" onclick="toggleDone(${index})">✓</button>
                                <button class="btn-trash" onclick="trashSong(${index})">🗑️</button>
                            </div>
                        </div>`;
                } else {
                    doneList.innerHTML += `
                        <div class="admin-item is-done-admin">
                            <div class="song-details">
                                <h3>${item.artist} - ${item.title}</h3>
                            </div>
                            <div class="actions-flex">
                                <button class="btn-control" onclick="toggleDone(${index})">↩</button>
                            </div>
                        </div>`;
                }
            });
        } catch(e) { console.log(e); }
    }

    async function addExactSlots(slots) {
        const minutesToAdd = slots * 6; 
        await fetch('/api/admin/overtime', { 
            method: 'POST', 
            headers: {'Authorization': token, 'Content-Type':'application/json'}, 
            body: JSON.stringify({ minutes: minutesToAdd }) 
        }); 
        loadAdminQueue(); 
        alert(`⚡ Meilenstein erreicht: ${slots} Plätze freigeschaltet (+${minutesToAdd} Min. Limit)!`);
    }

    async function deleteChampion(hIndex) {
        if(confirm("Möchtest du diesen Champion wirklich aus der Hall of Fame löschen?")) {
            await fetch(`/api/admin/halloffame/${hIndex}`, {
                method: 'DELETE',
                headers: {'Authorization': token}
            });
            loadAdminQueue();
        }
    }

    async function toggleHit(index) { await fetch(`/api/queue/${index}/hit`, { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function toggleDone(index) { await fetch(`/api/queue/${index}/done`, { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function trashSong(index) { 
        if(confirm("Song permanent löschen und Sendezeit wieder freigeben?")) {
            await fetch(`/api/queue/${index}`, { method: 'DELETE', headers: {'Authorization': token} }); 
            loadAdminQueue(); 
        } 
    }
    async function setOvertime(min) { await fetch('/api/admin/overtime', { method: 'POST', headers: {'Authorization': token, 'Content-Type':'application/json'}, body: JSON.stringify({ minutes: min }) }); loadAdminQueue(); }
    async function toggleVoting() { await fetch('/api/admin/toggle-voting', { method: 'POST', headers: {'Authorization': token} }); alert("Voting-Status geändert!"); }
    async function closeVotingAndSelectChamp() { await fetch('/api/admin/close-voting-champion', { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); }
    async function resetQueue() { if(confirm("Warteliste leeren?")) { await fetch('/api/queue/reset', { method: 'POST', headers: {'Authorization': token} }); loadAdminQueue(); } }
</script>
</body>
</html>
