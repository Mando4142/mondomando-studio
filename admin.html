<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><title>Admin Mondo</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; }
        body { background: #0b0b12; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #14141f; padding: 20px; border-radius: 12px; border: 2px solid var(--neon-pink); margin-bottom: 20px; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .admin-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
        .drag-handle { cursor: grab; margin-right: 15px; color: var(--neon-cyan); }
    </style>
</head>
<body>
    <div class="card">
        <h1>ADMIN ZENTRALE</h1>
        <button class="btn" onclick="setSystemStatus(true)">ONLINE</button>
        <button class="btn" onclick="setSystemStatus(false)">OFFLINE</button>
        <button class="btn" onclick="toggleExtension()">⏳ VERLÄNGERUNG</button>
        <button class="btn" onclick="resetQueue()">RESET</button>
    </div>
    <div class="card">
        <h2>⭐ HEUTIGE HITS (EXPORT)</h2>
        <div id="admin-hit-export-list"></div>
    </div>
    <div class="card">
        <h2>🔥 EINSENDUNGEN</h2>
        <div id="admin-active-list"></div>
    </div>
    <script>
        let token = prompt("Passwort:");
        async function load() {
            const res = await fetch('/api/queue'); const data = await res.json();
            const active = document.getElementById('admin-active-list'); active.innerHTML = '';
            data.queue.filter(s=>!s.isDone).forEach((s, i) => {
                active.innerHTML += `<div class="admin-item"><div style="display:flex;"><span class="drag-handle">☰</span><div>${s.artist} - ${s.title}</div></div><div><button onclick="toggleHit(${i})">HIT</button><button onclick="toggleDone(${i})">✓</button></div></div>`;
            });
            const hits = document.getElementById('admin-hit-export-list'); hits.innerHTML = '';
            data.queue.filter(s=>s.isHit).forEach(s => hits.innerHTML += `<div>${s.artist} - ${s.title} : <a href="${s.songLink}" target="_blank">LINK</a></div>`);
            new Sortable(active, { handle: '.drag-handle', onEnd: (e) => fetch('/api/admin/reorder-active', { method: 'POST', headers: {'Authorization': token, 'Content-Type': 'application/json'}, body: JSON.stringify({ oldIndex: e.oldIndex, newIndex: e.newIndex }) }) });
        }
        async function setSystemStatus(on) { await fetch('/api/admin/set-system-status', { method: 'POST', headers: {'Authorization': token, 'Content-Type': 'application/json'}, body: JSON.stringify({ online: on }) }); load(); }
        async function toggleExtension() { await fetch('/api/admin/toggle-extension', { method: 'POST', headers: {'Authorization': token} }); load(); }
        async function toggleHit(i) { await fetch(`/api/queue/${i}/hit`, { method: 'POST', headers: {'Authorization': token} }); load(); }
        async function toggleDone(i) { await fetch(`/api/queue/${i}/done`, { method: 'POST', headers: {'Authorization': token} }); load(); }
        async function resetQueue() { await fetch('/api/queue/reset', { method: 'POST', headers: {'Authorization': token} }); load(); }
        load();
    </script>
</body>
</html>
