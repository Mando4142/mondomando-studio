<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando - Admin Schaltzentrale</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-orange: #ff5500; }
        body { background: #0b0b12; color: white; font-family: 'Impact', sans-serif; padding: 20px; }
        .card { background: #14141f; padding: 20px; border-radius: 12px; border: 2px solid var(--neon-pink); margin-bottom: 20px; }
        .btn { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; margin: 5px; color: white; }
        .status-box { padding: 10px; border-radius: 6px; text-align: center; font-family: sans-serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ADMIN ZENTRALE</h1>
        <div id="status-display" class="status-box" style="background:#333;">Status: Lade...</div>
        
        <button class="btn" style="background:#22c55e;" onclick="setSystemStatus(true)">SHOW ONLINE</button>
        <button class="btn" style="background:#ef4444;" onclick="setSystemStatus(false)">SHOW OFFLINE</button>
        
        <button id="btn-ext-status" class="btn" style="background:var(--neon-orange);" onclick="toggleExtension()">⏳ VERLÄNGERUNG: LADEN...</button>
        
        <button class="btn" style="background:var(--neon-cyan); color:black;" onclick="addExtensionSlots(2)">⚡ +2 PLÄTZE VERLÄNGERUNG</button>
        
        <button class="btn" style="background:var(--neon-gold); color:black;" onclick="toggleVoting()">🏆 VOTE</button>
    </div>

    <div class="card">
        <h2>🔥 EINSENDUNGEN</h2>
        <div id="admin-active-list"></div>
    </div>

    <script>
        let token = prompt("Passwort:");
        
        async function load() {
            const res = await fetch('/api/queue'); const data = await res.json();
            const statusBox = document.getElementById('status-display');
            const extBtn = document.getElementById('btn-extension-toggle');
            
            statusBox.innerText = data.systemOnline ? "✅ SYSTEM IST ONLINE" : "❌ SYSTEM IST OFFLINE";
            statusBox.style.background = data.systemOnline ? "#22c55e" : "#ef4444";
            
            document.getElementById('btn-ext-status').innerText = data.extensionActive ? "✅ VERLÄNGERUNG AKTIV" : "❌ VERLÄNGERUNG INAKTIV";
            document.getElementById('btn-ext-status').style.background = data.extensionActive ? "#22c55e" : "#ff5500";
            
            const active = document.getElementById('admin-active-list'); active.innerHTML = '';
            data.queue.filter(s=>!s.isDone).forEach((s, i) => {
                active.innerHTML += `<div class="admin-item">${s.artist} - ${s.title} <button onclick="trashSong(${i})">🗑️</button></div>`;
            });
        }

        async function setSystemStatus(on) {
            const res = await fetch('/api/admin/set-system-status', { method:'POST', headers:{'Authorization':token, 'Content-Type':'application/json'}, body: JSON.stringify({online:on}) });
            if(res.ok) alert(on ? "System ist jetzt Online!" : "System ist jetzt Offline!");
            load();
        }

        async function toggleExtension() {
            const res = await fetch('/api/admin/toggle-extension', { method:'POST', headers:{'Authorization':token} });
            const data = await res.json();
            alert(data.extensionActive ? "Verlängerung wurde aktiviert!" : "Verlängerung wurde deaktiviert!");
            load();
        }

        async function addExtensionSlots(slots) {
            // Hier nutzen wir die Overtime-Funktion für die +2 Plätze
            const res = await fetch('/api/admin/overtime', { method:'POST', headers:{'Authorization':token, 'Content-Type':'application/json'}, body: JSON.stringify({minutes: slots * 6}) });
            if(res.ok) alert("Verlängerungs-Slots hinzugefügt!");
            load();
        }

        async function trashSong(i) { await fetch(`/api/queue/${i}`, { method:'DELETE', headers:{'Authorization':token} }); load(); }
        load();
    </script>
</body>
</html>
