<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Records</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-green: #22c55e; --neon-orange: #ff5500; --form-bg: rgba(19, 19, 26, 0.85); --text-muted: #8e8e9f; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', sans-serif; color: white; overflow: hidden; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('studio_bg.jpg') center/cover; filter: brightness(0.8); z-index: -1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; padding: 40px 0; display: flex; justify-content: center; }
        .content { width: 100%; max-width: 650px; pointer-events: auto; }
        .card { background: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0,242,254,0.2); backdrop-filter: blur(5px); }
        .card.pink-glow { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        h2 { margin-top: 0; border-bottom: 3px solid var(--neon-pink); padding-bottom: 8px; text-shadow: 0 0 8px var(--neon-cyan); letter-spacing: 2px; }
        input, select { width: 100%; padding: 14px; background: rgba(5,5,7,0.8); border: 2px solid #2a2a35; border-radius: 8px; color: white; font-family: sans-serif; font-weight: bold; margin-bottom: 15px; box-sizing: border-box;}
        label { font-family: sans-serif; font-size: 14px; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .btn-submit { width: 100%; padding: 15px; font-size: 20px; font-family: 'Impact'; background: var(--neon-pink); color: white; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top:10px; transition: transform 0.2s; }
        .btn-submit:active { transform: scale(0.98); }
        .queue-item { background: rgba(5,5,7,0.8); border-left: 5px solid var(--neon-cyan); padding: 15px; margin-bottom: 10px; border-radius: 6px; font-family: sans-serif; display: flex; justify-content: space-between; align-items: center; }
        .dice-winner-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .modal { display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #14141f; padding: 30px; border: 2px solid var(--neon-gold); border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 0 30px var(--neon-gold); }
        .dice-badge { background: var(--neon-pink); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .link-icon { font-size: 12px; margin-left: 8px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }
        .icon-spotify { background: #1DB954; color: black; }
        .icon-youtube { background: #FF0000; }
        
        .timer-container { margin: 25px 0; padding: 20px; background: rgba(5, 5, 7, 0.8); border: 2px solid #2a2a35; border-radius: 12px; text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .timer-text { font-size: 56px; font-family: 'Impact', sans-serif; letter-spacing: 4px; margin-bottom: 15px; transition: color 0.5s; }
        .timer-progress-bg { width: 100%; height: 24px; background: #1a1a24; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .timer-progress-bar { height: 100%; width: 100%; transition: width 1s linear, background-color 0.5s ease, box-shadow 0.5s ease; }
        .timer-green { color: #22c55e; text-shadow: 0 0 20px rgba(34,197,94,0.6); } .timer-green .timer-progress-bar { background-color: #22c55e; box-shadow: 0 0 15px #22c55e; }
        .timer-yellow { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6); } .timer-yellow .timer-progress-bar { background-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .timer-red { color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.6); } .timer-red .timer-progress-bar { background-color: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .pulse-danger { animation: pulse-danger 1s infinite; }
        @keyframes pulse-danger { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .vote-item { cursor: pointer; transition: 0.2s; justify-content: flex-start; }
        .vote-item:hover { border-color: var(--neon-pink); }
        .vote-item input[type="checkbox"] { transform: scale(1.5); accent-color: var(--neon-pink); margin-right: 15px; pointer-events: none; width: auto; }
        .queue-time { text-align: right; font-weight: bold; color: var(--neon-cyan); font-size: 14px; text-shadow: 0 0 5px rgba(0, 242, 254, 0.4); }
        .badge-hit { background-color: var(--neon-gold); color: black; font-family: 'Impact', sans-serif; font-size: 12px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
        .hof-card { background: rgba(5, 5, 7, 0.8); border: 2px solid var(--neon-gold); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.15); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay">
        <div class="content">

            <div class="card" style="border-color: var(--neon-gold); box-shadow: 0 0 20px rgba(255,215,0,0.3);">
                <h2 style="color: var(--neon-gold); border-color: var(--neon-gold);">💳 MONDO GOLD PASS</h2>
                <p style="font-family:sans-serif; font-size:14px; color:#ccc;">Maximal 2 Käufe pro Pass und Stream erlaubt.</p>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-submit" style="background:#ff5500;" onclick="openPassModal('priority')">🚀 PRIORITY BOOST (6.20 CHF)</button>
                    <button class="btn-submit" style="background:#6b21a8;" onclick="openPassModal('afterhours')">🌙 AFTER HOURS SLOT (5.00 CHF)</button>
                    <button class="btn-submit" style="background:#2563eb;" onclick="openPassModal('dice')">🎲 SONGWÜRFEL (3.50 CHF)</button>
                </div>
            </div>

            <div id="dynamic-main-card" class="card pink-glow">
                <h2 id="main-title">SONG EINREICHEN</h2>
                <div id="offline-message" style="display:none; text-align:center; padding: 40px 20px; font-size: 20px; color: var(--neon-pink); border: 2px dashed var(--neon-pink); border-radius: 12px; background: rgba(0,0,0,0.6);"></div>

                <div id="form-container">
                    <form id="songForm" onsubmit="submitSong(event)">
                        <label>Künstlername</label><input type="text" id="artistName" required placeholder="Dein Name">
                        <label>Song Titel</label><input type="text" id="songTitle" required placeholder="Titel des Tracks">
                        <label>Link (Spotify/YouTube)</label><input type="url" id="songLink" required placeholder="https://...">
                        <div style="display:flex; gap:10px;">
                            <div style="width:50%;"><label>Minuten</label><input type="number" id="durationMin" required min="0"></div>
                            <div style="width:50%;"><label>Sekunden</label><input type="number" id="durationSec" required min="0" max="59"></div>
                        </div>
                        <label>Genre</label>
                        <select id="genre" required>
                            <option value="Hip Hop / Rap / Trap">Hip Hop / Rap / Trap</option>
                            <option value="R&B / Soul / Funk">R&B / Soul / Funk</option>
                            <option value="Pop / Modern Hit">Pop / Modern Hit</option>
                            <option value="Reggae / Dancehall / Afrobeats">Reggae / Dancehall / Afrobeats</option>
                            <option value="Latin / Reggaeton">Latin / Reggaeton</option>
                            <option value="Anderes Genre">Anderes passendes Genre</option>
                        </select>
                        <button type="submit" class="btn-submit">SONG EINSENDEN</button>
                    </form>
                </div>

                <div id="voting-container" style="display:none;"></div>
            </div>

            <div class="card">
                <h2>WARTELISTE (<span id="q-count">0</span>)</h2>
                <div id="queue-list"></div>
            </div>

            <div class="card" style="border-color: #6b21a8;">
                <h2 style="color: #c084fc; border-color: #6b21a8;">🌙 AFTER HOURS (<span id="ah-count">0</span>)</h2>
                <div id="after-hours-list"></div>
            </div>

            <div class="card" style="border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);">
                <h2 style="color: var(--neon-gold); border-bottom-color: var(--neon-gold);">⭐ HIT PLAYLIST (LIVE) ⭐</h2>
                <div id="hit-bestenliste"></div>
            </div>

            <div class="card" style="border-color: #ffaa00; box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);">
                <h2 style="text-shadow: 0 0 10px #ffaa00; border-bottom-color: #ffaa00; color: #ffaa00; text-align:center;">👑 HALL OF FAME 👑</h2>
                <div id="hof-list"></div>
            </div>

        </div>
    </div>

    <div id="modal-priority" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon-gold);">🚀 PRIORITY BOOST</h2>
            <label>Dein exakter Künstlername aus der Liste</label>
            <input type="text" id="p-artist" placeholder="z.B. Mando">
            <button class="btn-submit" onclick="buyPass('priority_boost', 'p-artist')">ZUR KASSE (6.20 CHF)</button>
            <button class="btn-submit" style="background:#444;" onclick="closeModals()">ABBRECHEN</button>
        </div>
    </div>

    <div id="modal-afterhours" class="modal">
        <div class="modal-content" style="max-height:90vh; overflow-y:auto;">
            <h2 style="color:var(--neon-gold);">🌙 AFTER HOURS SLOT</h2>
            <label>Künstler</label><input type="text" id="ah-artist">
            <label>Titel</label><input type="text" id="ah-title">
            <label>Link</label><input type="url" id="ah-link">
            <div style="display:flex; gap:10px;">
                <input type="number" id="ah-min" placeholder="Min" style="width:50%;"><input type="number" id="ah-sec" placeholder="Sek" style="width:50%;">
            </div>
            <label>Genre</label><input type="text" id="ah-genre">
            <button class="btn-submit" onclick="buyAfterHours()">ZUR KASSE (5.00 CHF)</button>
            <button class="btn-submit" style="background:#444;" onclick="closeModals()">ABBRECHEN</button>
        </div>
    </div>

    <div id="modal-dice" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--neon-gold);">🎲 SONGWÜRFEL</h2>
            <label>Dein Künstlername zur Verifizierung</label>
            <input type="text" id="d-artist" placeholder="z.B. Mando">
            <button class="btn-submit" onclick="buyPass('song_dice', 'd-artist')">ZUR KASSE (3.50 CHF)</button>
            <button class="btn-submit" style="background:#444;" onclick="closeModals()">ABBRECHEN</button>
        </div>
    </div>

<script>
    let knownDiceId = null;
    let selectedVotes = [];
    let lastVotingPhase = 'inactive';
    let localTimerInterval = null;
    let localRemainingSeconds = 0;

    function openPassModal(type) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById(`modal-${type}`).style.display = 'flex';
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function buyPass(endpoint, inputId) {
        const artist = document.getElementById(inputId).value;
        if (!artist) return alert("Künstlername fehlt!");
        const res = await fetch(`/api/checkout/${endpoint}`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({artist}) });
        const data = await res.json();
        if (data.error) alert(data.error); else window.location.href = data.url;
    }

    async function buyAfterHours() {
        const payload = {
            artist: document.getElementById('ah-artist').value, title: document.getElementById('ah-title').value,
            songLink: document.getElementById('ah-link').value, genre: document.getElementById('ah-genre').value,
            duration: (parseInt(document.getElementById('ah-min').value||0)*60) + parseInt(document.getElementById('ah-sec').value||0)
        };
        if(!payload.artist || !payload.title || !payload.songLink) return alert("Fülle alle Felder aus!");
        const res = await fetch('/api/checkout/after_hours', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.error) alert(data.error); else window.location.href = data.url;
    }

    async function submitSong(e) {
        e.preventDefault();
        const payload = {
            artist: document.getElementById('artistName').value, title: document.getElementById('songTitle').value,
            songLink: document.getElementById('songLink').value, genre: document.getElementById('genre').value,
            duration: (parseInt(document.getElementById('durationMin').value||0)*60) + parseInt(document.getElementById('durationSec').value||0)
        };
        const res = await fetch('/api/submit', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.error) alert(data.error); 
        else { 
            alert("✅ SONG EINGEREICHT! Dein Voting-Code: " + data.voteCode); 
            document.getElementById('songForm').reset(); 
            loadQueue(); 
        }
    }

    function startLocalTimer(seconds) {
        if (localTimerInterval) clearInterval(localTimerInterval);
        localRemainingSeconds = seconds; updateTimerVisuals();
        localTimerInterval = setInterval(() => {
            localRemainingSeconds--;
            if (localRemainingSeconds <= 0) { localRemainingSeconds = 0; clearInterval(localTimerInterval); }
            updateTimerVisuals();
        }, 1000);
    }

    function updateTimerVisuals() {
        const tContainer = document.getElementById('voting-timer-container');
        if (!tContainer) return;
        const m = Math.floor(localRemainingSeconds / 60); const s = localRemainingSeconds % 60;
        document.getElementById('voting-timer-text').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
        
        const perc = (localRemainingSeconds / 240) * 100;
        document.getElementById('voting-timer-bar').style.width = `${Math.min(100, perc)}%`;
        
        tContainer.classList.remove('timer-green', 'timer-yellow', 'timer-red', 'pulse-danger');
        if (localRemainingSeconds > 120) { tContainer.classList.add('timer-green'); } 
        else if (localRemainingSeconds > 60) { tContainer.classList.add('timer-yellow'); } 
        else { tContainer.classList.add('timer-red'); tContainer.classList.add('pulse-danger'); }
    }

    function toggleVoteSelect(songId) {
        const index = selectedVotes.indexOf(songId);
        const checkbox = document.getElementById(`chk-${songId}`);
        if (index > -1) {
            selectedVotes.splice(index, 1); checkbox.checked = false;
        } else {
            if (selectedVotes.length >= 2) return alert("Du hast bereits 2 Stimmen vergeben!");
            selectedVotes.push(songId); checkbox.checked = true;
        }
        const remain = 2 - selectedVotes.length;
        const statusEl = document.getElementById('vote-status');
        if(statusEl) {
            statusEl.innerText = `Noch ${remain} Stimme${remain===1?'':'n'} übrig`;
            statusEl.style.color = remain === 0 ? '#22c55e' : 'var(--neon-gold)';
        }
    }

    async function submitVote() {
        const voteCode = document.getElementById('voterCodeInput').value;
        if (!voteCode || selectedVotes.length !== 2) return alert("Bitte Code eingeben und genau 2 Songs wählen!");
        
        const res = await fetch('/api/vote', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ voteCode, vote1: selectedVotes[0], vote2: selectedVotes[1] })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else document.getElementById('voting-container').innerHTML = `<h2 style="color:#22c55e; text-align:center;">✅ STIMMEN GESPEICHERT!</h2>`;
    }

    async function loadQueue() {
        try {
            const res = await fetch('/api/queue'); const data = await res.json();
            
            const formContainer = document.getElementById('form-container');
            const offlineMsg = document.getElementById('offline-message');
            const votingContainer = document.getElementById('voting-container');
            const mainTitle = document.getElementById('main-title');
            const mainCard = document.getElementById('dynamic-main-card');

            // Voting Pop-Up & Logic
            if (lastVotingPhase !== 'active' && data.votingPhase === 'active') {
                alert("🚨 VOTING IST LIVE! Hol deinen Code raus.");
            }
            lastVotingPhase = data.votingPhase;

            if (data.systemOnline === false) {
                formContainer.style.display = 'none'; votingContainer.style.display = 'none';
                offlineMsg.style.display = 'block'; offlineMsg.innerText = "DASHBOARD GESPERRT!";
                mainTitle.innerText = "SYSTEM OFFLINE";
            } else if (data.votingPhase === 'active' || data.votingPhase === 'tiebreak') {
                formContainer.style.display = 'none'; offlineMsg.style.display = 'none';
                votingContainer.style.display = 'block'; mainTitle.style.display = 'none';
                mainCard.style.borderColor = "var(--neon-gold)";
                
                if(data.votingPhase === 'active') {
                    if (!document.getElementById('voting-timer-container')) {
                        votingContainer.innerHTML = `
                            <h2 style="color: var(--neon-gold); text-align:center;">🗳️ HIT DES TAGES VOTING 🗳️</h2>
                            <div id="voting-timer-container" class="timer-container timer-green">
                                <div id="voting-timer-text" class="timer-text">04:00</div>
                                <div class="timer-progress-bg"><div id="voting-timer-bar" class="timer-progress-bar"></div></div>
                            </div>
                            <input type="text" id="voterCodeInput" style="text-align:center; font-size:24px; letter-spacing:5px;" placeholder="DEIN CODE">
                            <div id="vote-status" style="text-align:center; color:var(--neon-gold); font-size:18px; margin-bottom:15px;">Noch 2 Stimmen übrig</div>
                            <div id="voting-hits-list"></div>
                            <button class="btn-submit" style="background:var(--neon-gold); color:black;" onclick="submitVote()">ABSTIMMEN</button>
                        `;
                    }
                    const hits = [...data.queue, ...data.afterHoursQueue].filter(s => s.isHit);
                    let vHtml = '';
                    hits.forEach(h => {
                        const isChecked = selectedVotes.includes(h.id) ? 'checked' : '';
                        vHtml += `<div class="queue-item vote-item" onclick="toggleVoteSelect('${h.id}')">
                            <input type="checkbox" id="chk-${h.id}" ${isChecked}>
                            <div><b>${h.artist}</b> - ${h.title}</div>
                        </div>`;
                    });
                    document.getElementById('voting-hits-list').innerHTML = vHtml;

                    if (!localTimerInterval || Math.abs(localRemainingSeconds - data.votingRemainingSeconds) > 2) {
                        startLocalTimer(data.votingRemainingSeconds);
                    }
                } else {
                    votingContainer.innerHTML = `<h2 style="color:var(--neon-pink); text-align:center;">⚠️ GLEICHSTAND!</h2><p style="text-align:center;">Mondo wählt den Gewinner manuell.</p>`;
                    if(localTimerInterval) { clearInterval(localTimerInterval); localTimerInterval = null; }
                }
            } else {
                votingContainer.style.display = 'none'; mainTitle.style.display = 'block';
                if(localTimerInterval) { clearInterval(localTimerInterval); localTimerInterval = null; }
                
                if (data.phase === 'base') {
                    formContainer.style.display = 'block'; offlineMsg.style.display = 'none';
                    mainTitle.innerText = "SONG EINREICHEN"; mainCard.style.borderColor = "var(--neon-cyan)";
                } else if (data.phase === 'base_full') {
                    formContainer.style.display = 'none'; offlineMsg.style.display = 'block';
                    mainTitle.innerText = "HAUPTZEIT VOLL"; mainCard.style.borderColor = "var(--neon-pink)";
                    offlineMsg.innerHTML = `🔒 90 MINUTEN VOLL!<br>Nutze den After Hours Pass.`;
                } else if (data.phase === 'extension') {
                    formContainer.style.display = 'block'; offlineMsg.style.display = 'none';
                    mainTitle.innerText = "🔥 VERLÄNGERUNG 🔥"; mainCard.style.borderColor = "var(--neon-orange)";
                } else if (data.phase === 'extension_full') {
                    formContainer.style.display = 'none'; offlineMsg.style.display = 'block';
                    mainTitle.innerText = "VERLÄNGERUNG VOLL"; mainCard.style.borderColor = "var(--neon-pink)";
                    offlineMsg.innerHTML = `🚫 ABSOLUTER STOPP!`;
                }
            }

            // Listen Rendern
            const qList = document.getElementById('queue-list'); qList.innerHTML = '';
            const ahList = document.getElementById('after-hours-list'); ahList.innerHTML = '';
            const hitList = document.getElementById('hit-bestenliste'); hitList.innerHTML = '';
            const hofList = document.getElementById('hof-list'); hofList.innerHTML = '';

            let accTime = 0;
            const activeNormal = data.queue.filter(s => !s.isDone);
            activeNormal.forEach((item, index) => {
                const diceBadge = item.songDiceWinner ? `<span class="dice-badge">🎲 GEWÜRFELT</span><br>` : '';
                const hitBadge = item.isHit ? `<span class="badge-hit">🔥 HIT!</span> ` : '';
                const min = Math.floor(item.duration / 60); const sec = item.duration % 60;
                let timeText = index === 0 ? `NEXT UP` : `~${Math.floor(accTime/60)} MIN`;
                accTime += item.duration + 120;
                
                qList.innerHTML += `<div class="queue-item" style="${item.isHit ? 'border-color:var(--neon-gold);' : ''}">
                    <div>${hitBadge}${diceBadge}<b>${item.artist}</b> - ${item.title}<br><small style="color:var(--text-muted);">${min}:${sec < 10 ? '0':''}${sec} Min | ${item.genre}</small></div>
                    <div class="queue-time">${timeText}</div>
                </div>`;
            });

            const activeAH = data.afterHoursQueue.filter(s => !s.isDone);
            activeAH.forEach((item) => {
                const hitBadge = item.isHit ? `<span class="badge-hit">🔥 HIT!</span> ` : '';
                ahList.innerHTML += `<div class="queue-item" style="border-color:#c084fc;">
                    <div>${hitBadge}<b>${item.artist}</b> - ${item.title}</div>
                </div>`;
            });

            document.getElementById('q-count').innerText = activeNormal.length;
            document.getElementById('ah-count').innerText = activeAH.length;

            const allHits = [...data.queue, ...data.afterHoursQueue].filter(s => s.isHit);
            allHits.forEach(item => {
                hitList.innerHTML += `<div class="queue-item" style="border-left:8px solid var(--neon-gold); border-color:var(--neon-gold);">
                    <div>⭐ <b>${item.artist}</b> - ${item.title}</div>
                </div>`;
            });

            if(data.hallOfFame.length === 0) hofList.innerHTML = '<div style="color:#aaa;">Noch keine Legenden verzeichnet.</div>';
            else data.hallOfFame.forEach(h => {
                hofList.innerHTML += `<div class="hof-card">
                    <h3 style="color:var(--neon-gold); margin:0;">${h.artist}</h3>
                    <p style="font-size:18px; font-weight:bold;">${h.title}</p>
                    <p style="color:var(--neon-pink); font-weight:bold;">🏆 ${h.votes} Stimmen</p>
                </div>`;
            });

            // Songwürfel Animation
            if (data.latestDiceWinner && data.latestDiceWinner.id !== knownDiceId) {
                knownDiceId = data.latestDiceWinner.id;
                const overlay = document.createElement('div');
                overlay.className = 'dice-winner-modal';
                overlay.innerHTML = `<div><h1 style="font-size:60px; margin:0;">🎲</h1><h1 style="color:var(--neon-cyan); text-shadow:0 0 20px var(--neon-cyan);">SONGWÜRFEL GEZOGEN</h1><h2 style="color:white;">${data.latestDiceWinner.artist} - ${data.latestDiceWinner.title}</h2><button class="btn-submit" onclick="this.parentElement.parentElement.remove()" style="width:200px; margin-top:20px;">GEIL!</button></div>`;
                document.body.appendChild(overlay);
            }

        } catch(e) {}
    }
    
    setInterval(loadQueue, 3000); loadQueue();
</script>
