<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Records - Dashboard</title>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-orange: #ff5500;
            --text-main: #ffffff; --form-bg: rgba(19, 19, 26, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.8); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 650px; pointer-events: auto; }
        
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1); backdrop-filter: blur(5px); }
        .card.pink-glow { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2), inset 0 0 15px rgba(255, 0, 127, 0.1); }
        .card.gold-glow { border-color: var(--neon-gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 215, 0, 0.1); }

        .btn-rules-small { position: absolute; top: 15px; right: 20px; background: rgba(255, 0, 127, 0.2); border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; text-transform: uppercase; animation: pulse-pink 2s infinite; font-family: sans-serif; }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 5px var(--neon-pink); } 50% { box-shadow: 0 0 15px var(--neon-pink); } 100% { box-shadow: 0 0 5px var(--neon-pink); } }
        
        .status-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; text-transform: uppercase; }
        .countdown-text { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.8); letter-spacing: 1px; }
        .badge-live { background-color: var(--neon-pink); color: white; padding: 4px 10px; border-radius: 4px; font-size: 14px; margin-right: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 15px var(--neon-pink); } 100% { opacity: 0.8; } }

        .calendar-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed rgba(0, 242, 254, 0.3); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 5px; background: rgba(5,5,7,0.8); border: 1px solid #2a2a35; border-radius: 6px; font-family: sans-serif; font-weight: bold; cursor: pointer; }
        .cal-day.is-selected { background: var(--neon-gold); color: black; border-color: white; transform: scale(1.1); z-index: 2; }

        .form-group { margin-bottom: 22px; }
        input[type="text"], input[type="url"], input[type="number"], select { width: 100%; padding: 14px; background-color: rgba(5, 5, 7, 0.8); border: 2px solid #2a2a35; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        .duration-inputs { display: flex; gap: 15px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 15px; background-color: rgba(5, 5, 7, 0.8); padding: 15px; border: 1px dashed var(--neon-pink); border-radius: 8px; margin-top: 10px; font-family: sans-serif; }
        .btn-submit { width: 100%; padding: 20px; font-size: 24px; text-transform: uppercase; color: #ffffff; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 3px; font-family: 'Impact', sans-serif; box-shadow: 0 0 20px var(--neon-pink); margin-top: 20px; background: linear-gradient(45deg, var(--neon-pink) 25%, #bc005b 25%, #bc005b 50%, var(--neon-pink) 50%, var(--neon-pink) 75%, #bc005b 75%, #bc005b); background-size: 50px 50px; animation: move-stripes 1.5s linear infinite; }
        @keyframes move-stripes { 0% { background-position: 0 0; } 100% { background-position: 50px 0; } }

        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background-color: rgba(5, 5, 7, 0.8); border: 1px solid #2a2a35; border-left: 5px solid var(--neon-cyan); border-radius: 6px; margin-bottom: 12px; font-family: sans-serif; }
        .hof-card { background: rgba(5, 5, 7, 0.8); border: 2px solid var(--neon-gold); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; }
        
        /* Regel-Popup Design */
        .rules-modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .rules-content { background: #14141f; margin: 10% auto; padding: 40px; border: 2px solid var(--neon-cyan); width: 80%; max-width: 600px; border-radius: 16px; color: white; text-align: center; }
    </style>
</head>
<body>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card" style="padding: 25px;">
                <div class="status-header">
                    <span id="stream-status-title"><span id="live-badge" class="badge-live" style="display:none;">LIVE</span>STREAM</span>
                    <span id="countdown" class="countdown-text">...</span>
                </div>
                <div class="calendar-section">
                    <div id="calendar-grid-content" class="calendar-grid"></div>
                </div>
            </div>

            <div class="card pink-glow">
                <button class="btn-rules-small" onclick="document.getElementById('rulesModal').style.display='block'">Regeln lesen</button>
                <h2>SONG EINREICHEN</h2>
                <form id="songForm" onsubmit="addSongToServer(event)">
                    <div class="form-group"><label>Künstler</label><input type="text" id="artistName" required></div>
                    <div class="form-group"><label>Titel</label><input type="text" id="songTitle" required></div>
                    <div class="form-group"><label>Link</label><input type="url" id="songLink" required></div>
                    <div class="form-group"><label>Dauer</label><div class="duration-inputs"><input type="number" id="durationMin" required><input type="number" id="durationSec" required></div></div>
                    <div class="form-group"><label>Genre</label><select id="genre" required><option>Pop</option><option>Hip Hop</option><option>Schlager (gesperrt)</option></select></div>
                    <button type="submit" class="btn-submit">SONG EINSENDEN</button>
                </form>
            </div>

            <div id="rulesModal" class="rules-modal">
                <div class="rules-content">
                    <h2 style="color:var(--neon-gold)">STREAM-REGELN</h2>
                    <p>1. 90 Min. Gesamtzeit.<br>2. Keine Fake-Namen.<br>3. Permabann bei Verstößen.</p>
                    <button onclick="document.getElementById('rulesModal').style.display='none'" class="btn-submit">Schließen</button>
                </div>
            </div>

            <div class="card pink-glow"><h2>WARTELISTE</h2><div id="queue-list"></div></div>
        </div>
    </div>

    <script>
        // Kalender, Queue und Submission Logik
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid-content');
            grid.innerHTML = '';
            for(let i=1; i<=7; i++) {
                const day = document.createElement('div');
                day.className = 'cal-day'; day.innerText = i;
                grid.appendChild(day);
            }
        }
        
        async function loadQueue() {
            try {
                const res = await fetch('/api/queue'); const data = await res.json();
                const list = document.getElementById('queue-list'); list.innerHTML = '';
                data.queue.filter(i=>!i.isDone).forEach(item => list.innerHTML += `<div class="queue-item"><h4>${item.artist} - ${item.title}</h4></div>`);
            } catch(e) {}
        }

        async function addSongToServer(e) {
            e.preventDefault();
            const res = await fetch('/api/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({
                artist: document.getElementById('artistName').value,
                title: document.getElementById('songTitle').value,
                duration: (parseInt(document.getElementById('durationMin').value)*60) + parseInt(document.getElementById('durationSec').value),
                songLink: document.getElementById('songLink').value
            })});
            const resData = await res.json();
            if(resData.voteCode) {
                const overlay = document.createElement('div');
                overlay.className = "popup-overlay"; overlay.style.display = "flex";
                overlay.innerHTML = `<div class="popup-content">
                    <h1>TRACK EINGEREICHT!</h1>
                    <div style="background:#000; padding:20px; font-size:40px; color:var(--neon-cyan); border:1px dashed var(--neon-cyan); margin:20px 0;">${resData.voteCode}</div>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/4fc302b9-f53e-4994-8612-11fd40e6c5d3?checkout[custom][voteCode]=${resData.voteCode}" style="background:var(--neon-cyan)" class="neon-link">🚀 PLATZ 1 BOOST</a>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/434396c0-e721-45e1-8751-f5d39d3a4632?checkout[custom][voteCode]=${resData.voteCode}" style="background:#7000ff; color:white" class="neon-link">🌙 AFTER HOURS PASS</a>
                    <a href="https://mondomandorecords.lemonsqueezy.com/checkout/buy/65229fc8-af91-4ef7-a20c-738d5933a25a?checkout[custom][voteCode]=${resData.voteCode}" style="background:var(--neon-pink); color:white" class="neon-link">🎲 SONGWÜRFEL</a>
                    <button onclick="this.parentElement.parentElement.remove()" class="btn-submit">SCHLIESSEN</button>
                </div>`;
                document.body.appendChild(overlay);
                document.getElementById('songForm').reset(); loadQueue();
            }
        }
        setInterval(loadQueue, 5000); loadQueue(); renderCalendar();
    </script>
</body>
</html>
