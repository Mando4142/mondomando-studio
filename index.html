<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Records - Song Einsenden & Infos</title>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700;
            --neon-green: #22c55e; --neon-orange: #ff5500;
            --text-main: #ffffff; --text-muted: #8e8e9f;
            --form-bg: rgba(19, 19, 26, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.8); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 650px; pointer-events: auto; }
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1); backdrop-filter: blur(5px); }
        .card.pink-glow { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2), inset 0 0 15px rgba(255, 0, 127, 0.1); }
        .card.gold-glow { border-color: var(--neon-gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 215, 0, 0.1); }
        h2 { text-transform: uppercase; margin-top: 0; font-size: 24px; letter-spacing: 2px; color: #ffffff; text-shadow: 0 0 8px var(--neon-cyan); border-bottom: 3px solid var(--neon-pink); padding-bottom: 8px; margin-bottom: 20px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-header button { background: rgba(0,242,254,0.1); border: 1px solid var(--neon-cyan); border-radius: 4px; padding: 5px 15px; color: var(--neon-cyan); font-size: 18px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-header { font-family: sans-serif; font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .cal-day { padding: 10px 5px; background: rgba(5,5,7,0.8); border: 1px solid #2a2a35; border-radius: 6px; font-family: sans-serif; cursor: pointer; }
        .cal-day.is-sunday { border-color: var(--neon-pink); color: var(--neon-pink); }
        .cal-day.has-hits { border-color: var(--neon-gold); color: var(--neon-gold); }
        .cal-day.is-selected { background: var(--neon-gold); color: black; }
        .info-link-container { display: flex; justify-content: center; margin-bottom: 25px; }
        .btn-info-page { background: rgba(34, 197, 94, 0.1); border: 2px solid var(--neon-green); color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 30px; font-size: 15px; font-weight: bold; }
        .status-container { display: flex; justify-content: space-between; font-family: sans-serif; font-weight: bold; }
        .stream-time-box { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0, 242, 254, 0.3); font-family: sans-serif; }
        .form-group { margin-bottom: 22px; }
        input, select { width: 100%; padding: 14px; background: rgba(5, 5, 7, 0.8); border: 2px solid #2a2a35; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 20px; background: var(--neon-pink); border: none; color: white; font-weight: bold; cursor: pointer; }
        .queue-item { display: flex; justify-content: space-between; padding: 15px; background: rgba(5, 5, 7, 0.8); border-left: 5px solid var(--neon-cyan); margin-bottom: 12px; }
        .is-playlist-hit { border-left: 5px solid var(--neon-gold); }
        #submit-error-box { background: #ef4444; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">◀</button>
                    <h3 id="cal-month-year">MONAT</h3>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <div id="calendar-grid-content" class="calendar-grid"></div>
                <button id="btn-live-view" style="display:none; width: 100%; margin-top: 10px;" onclick="resetToLiveView()">🔴 ZURÜCK</button>
            </div>
            <div class="card">
                <div class="status-container">
                    <div><span id="stream-status-title">NÄCHSTER STREAM</span></div>
                    <div id="countdown">BERECHNE...</div>
                </div>
                <div class="stream-time-box">
                    <div>ZEIT: <span id="time-left-pot">90 Min.</span></div>
                </div>
            </div>
            <div id="dynamic-main-card" class="card pink-glow">
                <h2 id="main-card-title">SONG EINREICHEN</h2>
                <div id="offline-message" style="display:none;"></div>
                <form id="songForm" onsubmit="addSongToServer(event)">
                    <input type="text" id="artistName" placeholder="Künstler" required>
                    <input type="text" id="songTitle" placeholder="Titel" required>
                    <input type="url" id="songLink" placeholder="Spotify/YouTube Link" required>
                    <input type="number" id="durationMin" placeholder="Min" required>
                    <input type="number" id="durationSec" placeholder="Sek" required>
                    <select id="genre" required><option value="Hip Hop">Hip Hop</option><option value="Pop">Pop</option></select>
                    <div id="submit-error-box"></div>
                    <button type="submit" class="btn-submit">SONG EINSENDEN</button>
                </form>
            </div>
            <div class="card pink-glow">
                <h2>WARTELISTE</h2>
                <div id="queue-list"></div>
            </div>
            <div class="card gold-glow">
                <h2 id="hit-playlist-title">⭐ HIT PLAYLIST (LIVE)</h2>
                <div id="hit-bestenliste"></div>
            </div>
            <div class="card gold-glow">
                <h2>🏆 EWIGE Künstler/Song Hall OF FAME 🏆</h2>
                <div id="hof-list"></div>
            </div>
            <div class="card">
                <h2>BEREITS BEWERTET</h2>
                <div id="done-list"></div>
            </div>
        </div>
    </div>
    <script>
        // Deine Logik... (Bitte hier deine bewährte Script-Logik einfügen, da sie exakt so funktioniert hat)
    </script>
</body>
</html>
