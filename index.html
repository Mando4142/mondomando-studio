<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mondo Mando Records</title>
    <style>
        :root { --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-orange: #ff5500; }
        body { background: #0b0b12; color: white; font-family: 'Impact', sans-serif; padding: 20px; }
        .card { background: rgba(19, 19, 26, 0.85); padding: 20px; border-radius: 12px; border: 2px solid var(--neon-cyan); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; }
        .btn-submit { background: var(--neon-pink); color: white; padding: 15px; border: none; width: 100%; cursor: pointer; }
        #submit-error-box { background: #ef4444; padding: 10px; display: none; text-align: center; font-weight: bold; }
        .cal-day { display: inline-block; padding: 10px; border: 1px solid #333; cursor: pointer; }
        .is-selected { background: var(--neon-gold); color: black; }
        .has-hits { border-color: var(--neon-gold); }
    </style>
</head>
<body>
    <div class="card">
        <div id="calendar-grid-content" style="display:flex; gap:5px;"></div>
        <button id="btn-live-view" style="display:none;" onclick="resetToLiveView()">🔴 ZURÜCK ZUR LIVE-SHOW</button>
    </div>
    <div class="card">
        <h2 id="main-card-title">SONG EINREICHEN</h2>
        <div id="offline-message" style="display:none;"></div>
        <form id="songForm" onsubmit="addSongToServer(event)">
            <input type="text" id="artistName" placeholder="Künstler" required>
            <input type="text" id="songTitle" placeholder="Titel" required>
            <input type="url" id="songLink" placeholder="Spotify/YouTube Link" required>
            <div style="display:flex; gap:5px;">
                <input type="number" id="durationMin" placeholder="Min" required>
                <input type="number" id="durationSec" placeholder="Sek" required>
            </div>
            <select id="genre" required>
                <option value="Hip Hop">Hip Hop</option>
                <option value="Pop">Pop</option>
            </select>
            <div id="submit-error-box"></div>
            <button type="submit" class="btn-submit">SONG EINSENDEN</button>
        </form>
    </div>
    <div class="card">
        <h2 id="hit-playlist-title">⭐ HIT PLAYLIST ⭐</h2>
        <div id="hit-bestenliste"></div>
    </div>
    <div class="card">
        <h2>🏆 EWIGE Künstler/Song Hall OF FAME 🏆</h2>
        <div id="hof-list"></div>
    </div>
    <div class="card">
        <h2>WARTELISTE</h2>
        <div id="queue-list"></div>
    </div>
    <script>
        let calDate = new Date(); let serverHistoricalHits = {}; let selectedArchiveDate = null;
        async function load() {
            const res = await fetch('/api/queue'); const data = await res.json();
            serverHistoricalHits = data.historicalHits;
            document.getElementById('queue-list').innerHTML = data.queue.filter(s=>!s.isDone).map(s => `<div>${s.artist} - ${s.title}</div>`).join('');
            const hits = document.getElementById('hit-bestenliste'); hits.innerHTML = '';
            (selectedArchiveDate ? (serverHistoricalHits[selectedArchiveDate] || []) : data.queue.filter(s=>s.isHit)).forEach(s => hits.innerHTML += `<div>⭐ ${s.artist} - ${s.title}</div>`);
            
            if(data.systemOnline === false) { document.getElementById('form-container').style.display='none'; document.getElementById('offline-message').innerText="OFFLINE!"; }
        }
        async function addSongToServer(e) {
            e.preventDefault();
            const res = await fetch('/api/submit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ 
                artist: document.getElementById('artistName').value, title: document.getElementById('songTitle').value, 
                songLink: document.getElementById('songLink').value, duration: (parseInt(document.getElementById('durationMin').value)*60)+parseInt(document.getElementById('durationSec').value),
                genre: document.getElementById('genre').value
            })});
            const data = await res.json();
            if(data.error) { const err = document.getElementById('submit-error-box'); err.innerText = data.error; err.style.display='block'; setTimeout(()=>err.style.display='none', 5000); }
            else load();
        }
        load();
    </script>
</body>
</html>
