<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondo Mando Records - Song Einsenden</title>
    <style>
        :root {
            --neon-pink: #ff007f; --neon-cyan: #00f2fe; --neon-gold: #ffd700; --neon-green: #22c55e;
            --neon-orange: #ff5500; --text-main: #ffffff; --text-muted: #8e8e9f; --form-bg: rgba(19, 19, 26, 0.85);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Impact', 'Arial Black', sans-serif; color: var(--text-main); overflow: hidden; }
        .studio-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('studio_bg.jpg'); background-size: cover; background-position: center; filter: brightness(0.8); z-index: -1; }
        .overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 0; box-sizing: border-box; }
        .interface-content { width: 100%; max-width: 650px; pointer-events: auto; }
        
        .card { background-color: var(--form-bg); border: 2px solid var(--neon-cyan); border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1); backdrop-filter: blur(5px); transition: all 0.5s ease; }
        .card.pink-glow { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.2), inset 0 0 15px rgba(255, 0, 127, 0.1); }
        .card.gold-glow { border-color: var(--neon-gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(255, 215, 0, 0.1); }

        .status-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; text-transform: uppercase; }
        .countdown-text { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.8); letter-spacing: 1px; }
        .status-divider { border: 0; border-top: 1px solid rgba(142, 142, 159, 0.4); margin: 15px 0; }
        .status-stats { display: flex; justify-content: space-between; font-family: sans-serif; font-size: 14px; font-weight: bold; }
        .time-highlight { color: var(--neon-cyan); }
        .time-urgent { color: var(--neon-pink); }
        .badge-live { background-color: var(--neon-pink); color: white; padding: 4px 10px; border-radius: 4px; font-size: 14px; margin-right: 10px; animation: pulse 1.5s infinite; vertical-align: middle; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 15px var(--neon-pink); } 100% { opacity: 0.8; } }

        .calendar-section { margin-top: 25px; padding-top: 20px; border-top: 1px dashed rgba(0, 242, 254, 0.3); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-header button { background: rgba(0,242,254,0.1); border: 1px solid var(--neon-cyan); border-radius: 4px; padding: 5px 15px; color: var(--neon-cyan); font-size: 18px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-header { font-family: sans-serif; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .cal-day { padding: 10px 5px; background: rgba(5,5,7,0.8); border: 1px solid #2a2a35; border-radius: 6px; font-family: sans-serif; font-weight: bold; cursor: pointer; }
        .cal-day.is-sunday { border-color: var(--neon-pink); color: var(--neon-pink); background: rgba(255,0,127,0.1); }
        .cal-day.has-hits { background: rgba(255, 215, 0, 0.15); border-color: var(--neon-gold); color: var(--neon-gold); }
        .cal-day.is-selected { background: var(--neon-gold); color: black; border-color: white; transform: scale(1.1); z-index: 2; }

        h2 { text-transform: uppercase; margin-top: 0; font-size: 24px; letter-spacing: 2px; color: #ffffff; text-shadow: 0 0 8px var(--neon-cyan); border-bottom: 3px solid var(--neon-pink); padding-bottom: 8px; margin-bottom: 20px; }
        
        .rule-pulse-box { border: 2px solid #ef4444 !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px #ef4444; } 50% { box-shadow: 0 0 10px #ef4444; } 100% { box-shadow: 0 0 0px #ef4444; } }

        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-size: 16px; text-transform: uppercase; color: var(--text-main); }
        input[type="text"], input[type="url"], input[type="number"], select { width: 100%; padding: 14px; background-color: rgba(5, 5, 7, 0.8); border: 2px solid #2a2a35; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        .duration-inputs { display: flex; gap: 15px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 15px; background-color: rgba(5, 5, 7, 0.8); padding: 15px; border: 1px dashed var(--neon-pink); border-radius: 8px; margin-top: 10px; font-family: sans-serif; }
        .btn-submit { width: 100%; padding: 20px; font-size: 24px; text-transform: uppercase; color: #ffffff; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 3px; font-family: 'Impact', sans-serif; box-shadow: 0 0 20px var(--neon-pink); margin-top: 20px; background: linear-gradient(45deg, var(--neon-pink) 25%, #bc005b 25%, #bc005b 50%, var(--neon-pink) 50%, var(--neon-pink) 75%, #bc005b 75%, #bc005b); background-size: 50px 50px; animation: move-stripes 1.5s linear infinite; }
        @keyframes move-stripes { 0% { background-position: 0 0; } 100% { background-position: 50px 0; } }

        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background-color: rgba(5, 5, 7, 0.8); border: 1px solid #2a2a35; border-left: 5px solid var(--neon-cyan); border-radius: 6px; margin-bottom: 12px; font-family: sans-serif; }
        .hof-card { background: rgba(5, 5, 7, 0.8); border: 2px solid var(--neon-gold); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; }
        #submit-error-box { color: #ffffff; background-color: #ef4444; border: 2px solid #b91c1c; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="studio-background"></div>
    <div class="overlay-container">
        <div class="interface-content">
            <div class="card" style="padding: 25px;">
                <div class="status-header">
                    <span id="stream-status-title"><span id="live-badge" class="badge-live" style="display:none;">LIVE</span>NÄCHSTER STREAM</span>
                    <span id="countdown" class="countdown-text">BERECHNE...</span>
                </div>
                <hr class="status-divider">
                <div class="status-stats">
                    <div>FREIE SENDEMINUTEN: <span id="time-left-pot" class="time-highlight">90 Min. 00 Sek.</span></div>
                    <div>BELEGTE SHOW-ZEIT: <span id="estimated-wait" class="time-highlight">0 Min. 00 Sek.</span></div>
                </div>
                <div class="calendar-section">
                    <div class="calendar-header">
                        <button onclick="changeMonth(-1)">◀</button>
                        <h3 id="cal-month-year" style="margin: 0; color: var(--neon-cyan); font-size: 20px; letter-spacing: 2px;">MONAT JAHR</h3>
                        <button onclick="changeMonth(1)">▶</button>
                    </div>
                    <div id="calendar-grid-content" class="calendar-grid"></div>
                    <button id="btn-live-view" style="display:none; width: 100%; margin-top: 15px; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 6px; font-family: 'Impact', sans-serif; cursor: pointer; font-size: 16px;" onclick="resetToLiveView()">🔴 ZURÜCK ZUR LIVE-SHOW</button>
                </div>
            </div>

            <div id="dynamic-main-card" class="card pink-glow">
                <h2 id="main-card-title">SONG EINREICHEN</h2>
                <form id="songForm" onsubmit="addSongToServer(event)">
                    <div class="form-group">
                        <label for="artistName">Künstlername</label>
                        <input type="text" id="artistName" required placeholder="z.B. Mando">
                    </div>
                    <div class="form-group">
                        <label for="songTitle">Song Titel</label>
                        <input type="text" id="songTitle" required placeholder="Titel deines Tracks">
                    </div>
                    <div class="form-group">
                        <label for="songLink">Song Link</label>
                        <input type="url" id="songLink" required placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Genaue Song-Dauer</label>
                        <div class="duration-inputs">
                            <input type="number" id="durationMin" required placeholder="MIN" min="0">
                            <input type="number" id="durationSec" required placeholder="SEK" min="0" max="59">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="genre">Genre</label>
                        <select id="genre" required onchange="checkGenreSafety()">
                            <option value="" disabled selected>Wähle deine Musikrichtung</option>
                            <option value="Pop / Modern Hit">Pop / Modern Hit</option>
                            <option value="Hip Hop / Rap / Trap">Hip Hop / Rap / Trap</option>
                            <option value="Rock / Alternative">Rock / Alternative</option>
                            <option value="R&B / Soul / Funk">R&B / Soul / Funk</option>
                            <option value="EDM / House / Dance">EDM / House / Dance</option>
                            <option value="Reggae / Dancehall / Afrobeats">Reggae / Dancehall / Afrobeats</option>
                            <option value="Latin / Reggaeton">Latin / Reggaeton</option>
                            <option value="Jazz / Blues">Jazz / Blues</option>
                            <option value="Lofi / Acoustic">Lofi / Acoustic / Chill</option>
                            <option value="Anderes Genre">Anderes passendes Genre</option>
                            <option value="Schlager" style="color: #ef4444;">[GESPERRT] Schlager</option>
                            <option value="Hardstyle" style="color: #ef4444;">[GESPERRT] Hardstyle</option>
                            <option value="Hardcore" style="color: #ef4444;">[GESPERRT] Hardcore</option>
                            <option value="Metal" style="color: #ef4444;">[GESPERRT] Metal</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label style="color: var(--neon-cyan);">Rechte, Richtlinien & Fair Play</label>
                        <label class="checkbox-group">
                            <input type="checkbox" required>
                            <span class="checkbox-label"><strong>BESTÄTIGEN:</strong> Ich besitze alle Rechte an diesem Song, verwende keine fremden Samples und der Track entspricht den Richtlinien.</span>
                        </label>
                        <label class="checkbox-group rule-pulse-box" style="background-color: rgba(239, 68, 68, 0.08);">
                            <input type="checkbox" required>
                            <span class="checkbox-label" style="color: #ffcccc;"><strong>FAIR PLAY & BANN-WARNUNG:</strong> Ich bestätige, dass ich mich fair gegenüber anderen verhalte und mir <strong>keine Fake-Namen</strong> ausdenke. Unfaires Verhalten führt zu einer sofortigen Sperre. Bei mehrfachen Vergehen folgt der <strong>Permabann!</strong></span>
                        </label>
                    </div>
                    
                    <div id="submit-error-box"></div>
                    <button type="submit" id="submitBtn" class="btn-submit">SONG EINSENDEN</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        // Die Skript-Logik bleibt wie gewohnt aktiv
        // [Hier das Skript aus der vorherigen Version einfügen]
    </script>
</body>
</html>
